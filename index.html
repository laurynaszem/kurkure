<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kemperio rezervacija</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      color: #ffffff;
      background:
        linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
        url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80')
        center center / cover no-repeat fixed;
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.25);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: bold;
      color: #f8fafc;
    }

    select,
    input,
    button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 15px;
    }

    select,
    input {
      background: rgba(255, 255, 255, 0.95);
      color: #111827;
    }

    button {
      margin-top: 18px;
      background: #f59e0b;
      color: #111827;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
    }

    button:hover {
      background: #fbbf24;
    }

    .message {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      display: none;
      font-size: 14px;
      line-height: 1.4;
    }

    .success {
      background: rgba(34, 197, 94, 0.22);
      color: #dcfce7;
      border: 1px solid rgba(134, 239, 172, 0.35);
    }

    .error {
      background: rgba(239, 68, 68, 0.22);
      color: #fee2e2;
      border: 1px solid rgba(252, 165, 165, 0.35);
    }

    .reservation-list {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .reservation-item {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.08);
    }

    .reservation-item h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .reservation-item p {
      margin: 4px 0;
      color: rgba(255, 255, 255, 0.88);
      line-height: 1.5;
    }

    .empty {
      color: rgba(255, 255, 255, 0.82);
      padding: 14px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      border: 1px dashed rgba(255, 255, 255, 0.24);
    }

    .delete-btn {
      margin-top: 12px;
      background: #ef4444;
      color: white;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="card">
      <h1>Kemperio rezervacija</h1>

      <form id="reservationForm">

        <label for="person">Pasirink žmogų</label>
        <select id="person" required>
          <option value="">-- Pasirink --</option>
          <option value="Mykolas">Mykolas</option>
          <option value="Laurynas">Laurynas</option>
          <option value="Other">Other</option>
        </select>

        <label for="startDate">Nuo</label>
        <input type="date" id="startDate" required />

        <label for="endDate">Iki</label>
        <input type="date" id="endDate" required />

        <label for="comment">Komentaras</label>
        <input type="text" id="comment" placeholder="Papildoma informacija..." />

        <button type="submit">Rezervuoti datas</button>

      </form>

      <div id="message" class="message"></div>
    </div>

    <div class="card">
      <h2>Esamos rezervacijos</h2>
      <div id="reservationList" class="reservation-list"></div>
    </div>

  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      deleteDoc,
      doc,
      query,
      orderBy,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBCz7h7wKuigNLIwOwBjVdQtzmUENHNHgA",
      authDomain: "kalendorius-fbd2a.firebaseapp.com",
      projectId: "kalendorius-fbd2a",
      storageBucket: "kalendorius-fbd2a.firebasestorage.app",
      messagingSenderId: "350657322462",
      appId: "1:350657322462:web:8c04fa113338d7d324514f"
    };

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    const reservationsRef = collection(db, "reservations");

    const form = document.getElementById("reservationForm");
    const reservationList = document.getElementById("reservationList");
    const messageBox = document.getElementById("message");

    const startDateInput = document.getElementById("startDate");
    const endDateInput = document.getElementById("endDate");

    const today = new Date().toISOString().split("T")[0];

    startDateInput.min = today;
    endDateInput.min = today;

    let liveReservations = [];

    function showMessage(text, type) {

      messageBox.textContent = text;
      messageBox.className = "message " + type;
      messageBox.style.display = "block";

      setTimeout(function () {
        messageBox.style.display = "none";
      }, 3500);
    }

    function formatDate(dateString) {

      const date = new Date(dateString);

      return date.toLocaleDateString("lt-LT", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    function datesOverlap(start1, end1, start2, end2) {

      return start1 <= end2 && start2 <= end1;
    }

    function renderReservations(reservations) {

      reservationList.innerHTML = "";

      if (reservations.length === 0) {

        reservationList.innerHTML =
          '<div class="empty">Kol kas rezervacijų nėra.</div>';

        return;
      }

      reservations.forEach(function (reservation) {

        const item = document.createElement("div");

        item.className = "reservation-item";

        item.innerHTML = `
          <h3>${reservation.person}</h3>

          <p><strong>Nuo:</strong>
          ${formatDate(reservation.startDate)}</p>

          <p><strong>Iki:</strong>
          ${formatDate(reservation.endDate)}</p>

          <p><strong>Komentaras:</strong>
          ${reservation.comment || "Nėra"}</p>

          <button class="delete-btn"
          data-id="${reservation.id}">
          Ištrinti
          </button>
        `;

        reservationList.appendChild(item);
      });

      document.querySelectorAll(".delete-btn")
      .forEach(function (button) {

        button.addEventListener("click", async function () {

          const id = button.getAttribute("data-id");

          try {

            await deleteDoc(doc(db, "reservations", id));

            showMessage(
              "Rezervacija ištrinta.",
              "success"
            );

          } catch (error) {

            showMessage(
              "Nepavyko ištrinti rezervacijos.",
              "error"
            );

            console.error(error);
          }
        });
      });
    }

    startDateInput.addEventListener("change", function () {

      endDateInput.min =
        startDateInput.value || today;

      if (
        endDateInput.value &&
        endDateInput.value < startDateInput.value
      ) {
        endDateInput.value = "";
      }
    });

    const reservationsQuery =
      query(
        reservationsRef,
        orderBy("startDate", "asc")
      );

    onSnapshot(
      reservationsQuery,

      function (snapshot) {

        liveReservations =
          snapshot.docs.map(function (docItem) {

            return {
              id: docItem.id,
              ...docItem.data()
            };
          });

        renderReservations(liveReservations);
      },

      function (error) {

        reservationList.innerHTML =
          '<div class="empty">Nepavyko užkrauti rezervacijų.</div>';

        console.error(error);
      }
    );

    form.addEventListener("submit", async function (event) {

      event.preventDefault();

      const person =
        document.getElementById("person").value;

      const startDate =
        startDateInput.value;

      const endDate =
        endDateInput.value;

      const comment =
        document.getElementById("comment")
        .value
        .trim();

      if (!person || !startDate || !endDate) {

        showMessage(
          "Užpildyk visus laukus.",
          "error"
        );

        return;
      }

      if (endDate < startDate) {

        showMessage(
          "Pabaigos data negali būti ankstesnė už pradžios datą.",
          "error"
        );

        return;
      }

      const hasConflict =
        liveReservations.some(function (reservation) {

          return datesOverlap(
            startDate,
            endDate,
            reservation.startDate,
            reservation.endDate
          );
        });

      if (hasConflict) {

        showMessage(
          "Šios datos jau užimtos.",
          "error"
        );

        return;
      }

      try {

        await addDoc(
          reservationsRef,
          {
            person: person,
            startDate: startDate,
            endDate: endDate,
            comment: comment,
            createdAt: new Date().toISOString()
          }
        );

        form.reset();

        startDateInput.min = today;
        endDateInput.min = today;

        showMessage(
          "Rezervacija sėkmingai išsaugota.",
          "success"
        );

      } catch (error) {

        showMessage(
          "Nepavyko išsaugoti rezervacijos.",
          "error"
        );

        console.error(error);
      }
    });

  </script>
</body>
</html>
